<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="panelBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EEEEEE;stop-opacity:1"/>
    </linearGradient>
    <filter id="ds4">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#F5F5F5"/>

  <!-- Title -->
  <rect x="150" y="10" width="500" height="40" rx="15" fill="#D32F2F"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">3 ระดับรอยขูดขีดบนสีรถ: แบบไหนขัดได้ แบบไหนต้องพ่นสี</text>

  <!-- Level 1: Surface scratch -->
  <g transform="translate(30, 70)">
    <rect width="230" height="320" rx="16" fill="url(#panelBg)" filter="url(#ds4)"/>
    <!-- Header -->
    <rect x="0" y="0" width="230" height="45" rx="16" fill="#4CAF50"/>
    <rect x="0" y="25" width="230" height="20" fill="#4CAF50"/>
    <text x="115" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">ระดับ 1: รอยขนแมว</text>
    <!-- Car paint layers illustration -->
    <rect x="30" y="65" width="170" height="25" rx="4" fill="#E53935" opacity="0.9"/>
    <text x="115" y="82" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ชั้นเคลือบเงา (Clear Coat)</text>
    <rect x="30" y="95" width="170" height="25" rx="4" fill="#C62828"/>
    <text x="115" y="112" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ชั้นสี (Base Coat)</text>
    <rect x="30" y="125" width="170" height="20" rx="4" fill="#9E9E9E"/>
    <text x="115" y="139" text-anchor="middle" font-size="9" fill="white">ชั้นรองพื้น (Primer)</text>
    <rect x="30" y="150" width="170" height="18" rx="4" fill="#616161"/>
    <text x="115" y="163" text-anchor="middle" font-size="9" fill="white">เหล็กตัวถัง</text>
    <!-- Scratch mark - shallow -->
    <line x1="60" y1="60" x2="160" y2="68" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
    <line x1="65" y1="63" x2="155" y2="70" stroke="#FFF9C4" stroke-width="1" opacity="0.8"/>
    <!-- Arrow showing depth -->
    <line x1="180" y1="58" x2="180" y2="78" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="195" y="70" font-size="9" fill="#FF9800" font-weight="bold">ตื้น</text>
    <!-- Description -->
    <text x="115" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#424242">รอยตื้นๆ บนชั้นเคลือบ</text>
    <text x="115" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#424242">เล็บจิกไม่สะดุด</text>
    <!-- Solution -->
    <rect x="25" y="235" width="180" height="30" rx="10" fill="#E8F5E9"/>
    <text x="115" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32">✓ ขัดสีออกได้ 100%</text>
    <!-- Cost indicator -->
    <text x="115" y="290" text-anchor="middle" font-size="12" fill="#4CAF50" font-weight="bold">$ ถูก</text>
    <text x="115" y="308" text-anchor="middle" font-size="10" fill="#757575">ใช้เวลา 1-2 ชม.</text>
  </g>

  <!-- Level 2: Medium scratch -->
  <g transform="translate(285, 70)">
    <rect width="230" height="320" rx="16" fill="url(#panelBg)" filter="url(#ds4)"/>
    <!-- Header -->
    <rect x="0" y="0" width="230" height="45" rx="16" fill="#FF9800"/>
    <rect x="0" y="25" width="230" height="20" fill="#FF9800"/>
    <text x="115" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">ระดับ 2: รอยลึกถึงสี</text>
    <!-- Car paint layers -->
    <rect x="30" y="65" width="170" height="25" rx="4" fill="#E53935" opacity="0.9"/>
    <text x="115" y="82" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ชั้นเคลือบเงา (Clear Coat)</text>
    <rect x="30" y="95" width="170" height="25" rx="4" fill="#C62828"/>
    <text x="115" y="112" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ชั้นสี (Base Coat)</text>
    <rect x="30" y="125" width="170" height="20" rx="4" fill="#9E9E9E"/>
    <text x="115" y="139" text-anchor="middle" font-size="9" fill="white">ชั้นรองพื้น (Primer)</text>
    <rect x="30" y="150" width="170" height="18" rx="4" fill="#616161"/>
    <text x="115" y="163" text-anchor="middle" font-size="9" fill="white">เหล็กตัวถัง</text>
    <!-- Scratch mark - medium depth -->
    <line x1="60" y1="60" x2="160" y2="68" stroke="#BDBDBD" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="70" y1="72" x2="150" y2="98" stroke="#BDBDBD" stroke-width="2.5"/>
    <!-- Arrow showing depth -->
    <line x1="180" y1="58" x2="180" y2="108" stroke="#FF9800" stroke-width="2"/>
    <text x="195" y="85" font-size="9" fill="#FF9800" font-weight="bold">กลาง</text>
    <!-- Description -->
    <text x="115" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#424242">รอยลึกจนเห็นสีต่างจากรอบข้าง</text>
    <text x="115" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#424242">เล็บจิกเริ่มสะดุด</text>
    <!-- Solution -->
    <rect x="25" y="235" width="180" height="30" rx="10" fill="#FFF3E0"/>
    <text x="115" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">⚠ ต้องขัดสี + แต้มสี</text>
    <!-- Cost indicator -->
    <text x="115" y="290" text-anchor="middle" font-size="12" fill="#FF9800" font-weight="bold">$$ ปานกลาง</text>
    <text x="115" y="308" text-anchor="middle" font-size="10" fill="#757575">ใช้เวลา 3-5 ชม.</text>
  </g>

  <!-- Level 3: Deep scratch -->
  <g transform="translate(540, 70)">
    <rect width="230" height="320" rx="16" fill="url(#panelBg)" filter="url(#ds4)"/>
    <!-- Header -->
    <rect x="0" y="0" width="230" height="45" rx="16" fill="#D32F2F"/>
    <rect x="0" y="25" width="230" height="20" fill="#D32F2F"/>
    <text x="115" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">ระดับ 3: รอยลึกถึงเหล็ก</text>
    <!-- Car paint layers -->
    <rect x="30" y="65" width="170" height="25" rx="4" fill="#E53935" opacity="0.9"/>
    <text x="115" y="82" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ชั้นเคลือบเงา (Clear Coat)</text>
    <rect x="30" y="95" width="170" height="25" rx="4" fill="#C62828"/>
    <text x="115" y="112" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ชั้นสี (Base Coat)</text>
    <rect x="30" y="125" width="170" height="20" rx="4" fill="#9E9E9E"/>
    <text x="115" y="139" text-anchor="middle" font-size="9" fill="white">ชั้นรองพื้น (Primer)</text>
    <rect x="30" y="150" width="170" height="18" rx="4" fill="#616161"/>
    <text x="115" y="163" text-anchor="middle" font-size="9" fill="white">เหล็กตัวถัง</text>
    <!-- Scratch mark - deep through all layers -->
    <line x1="60" y1="58" x2="160" y2="62" stroke="#9E9E9E" stroke-width="4" stroke-linecap="round"/>
    <line x1="70" y1="68" x2="155" y2="160" stroke="#9E9E9E" stroke-width="3"/>
    <!-- Arrow showing depth -->
    <line x1="180" y1="58" x2="180" y2="158" stroke="#D32F2F" stroke-width="2"/>
    <text x="195" y="110" font-size="9" fill="#D32F2F" font-weight="bold">ลึก!</text>
    <!-- Description -->
    <text x="115" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#424242">เห็นเหล็กตัวถังเป็นสีเทา/ขาว</text>
    <text x="115" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#424242">เล็บจิกสะดุดชัดเจน</text>
    <!-- Solution -->
    <rect x="25" y="235" width="180" height="30" rx="10" fill="#FFEBEE"/>
    <text x="115" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C62828">✕ ต้องพ่นสีใหม่เท่านั้น</text>
    <!-- Cost indicator -->
    <text x="115" y="290" text-anchor="middle" font-size="12" fill="#D32F2F" font-weight="bold">$$$ แพง</text>
    <text x="115" y="308" text-anchor="middle" font-size="10" fill="#757575">ใช้เวลา 1-3 วัน</text>
  </g>

  <!-- Bottom label -->
  <rect x="200" y="405" width="400" height="35" rx="12" fill="#424242" opacity="0.9"/>
  <text x="400" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">ส่งรูปให้ช่างประเมินฟรี! Line: @firstcarcenter</text>
</svg>
