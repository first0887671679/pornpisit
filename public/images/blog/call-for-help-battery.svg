<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFEDD5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="70" y="92" fill="#0F172A" font-size="46" font-weight="800" font-family="Arial, sans-serif">ไม่มีสายพ่วง ไม่มีรถช่วย ทำอย่างไร?</text>
  <text x="70" y="136" fill="#64748B" font-size="22" font-family="Arial, sans-serif">ทางออกฉุกเฉิน โซนศรีนครินทร์ • บางนา • เทพารักษ์ • แพรกษา • สมุทรปราการ</text>

  <rect x="70" y="190" width="1060" height="460" rx="28" fill="#FFFFFF" stroke="#FDBA74" stroke-width="2"/>
  
  <rect x="120" y="240" width="400" height="360" rx="24" fill="#FEF2F2"/>
  <text x="320" y="300" fill="#DC2626" font-size="36" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">ข้อควรระวัง!</text>
  <circle cx="320" cy="380" r="40" fill="#DC2626" fill-opacity="0.1"/>
  <text x="320" y="395" fill="#DC2626" font-size="40" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">❌</text>
  <text x="320" y="460" fill="#475569" font-size="24" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">อย่าฝืนสตาร์ทแช่ยาวๆ</text>
  <text x="320" y="500" fill="#475569" font-size="24" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">ถ้าบิดกุญแจแล้วเงียบ</text>
  <text x="320" y="540" fill="#64748B" font-size="20" font-family="Arial, sans-serif" text-anchor="middle">(อาจทำให้ไดสตาร์ทไหม้ หรือฟิวส์ขาด)</text>

  <path d="M560 420 L600 420 L580 400 M600 420 L580 440" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="640" y="240" width="450" height="360" rx="24" fill="#FFF7ED" stroke="#EA580C" stroke-width="4"/>
  <text x="865" y="300" fill="#EA580C" font-size="36" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">ทางแก้ที่จบที่สุด</text>
  <circle cx="865" cy="380" r="40" fill="#EA580C" fill-opacity="0.1"/>
  <text x="865" y="395" fill="#EA580C" font-size="40" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">📞</text>
  <text x="865" y="460" fill="#0F172A" font-size="28" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">เรียกช่างเปลี่ยนแบตด่วน</text>
  <text x="865" y="500" fill="#475569" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">บริการนอกสถานที่ 24 ชม.</text>
  <rect x="740" y="530" width="250" height="40" rx="20" fill="#EA580C"/>
  <text x="865" y="557" fill="#FFFFFF" font-size="20" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">ถึงที่หมายใน 30 นาที</text>
</svg>
