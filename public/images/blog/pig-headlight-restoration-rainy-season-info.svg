<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');
    text { font-family: 'Prompt', sans-serif; }
  </style>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-blue)"/>
  
  <!-- Car Headlight Before & After Graphic -->
  <g transform="translate(600, 280) scale(1.6)">
    
    <!-- VS Line in middle -->
    <path d="M0,-120 L0,120" stroke="#334155" stroke-width="4" stroke-dasharray="10,10"/>
    <circle cx="0" cy="0" r="25" fill="#1E293B" stroke="#334155" stroke-width="4"/>
    <text x="0" y="7" font-size="20" font-weight="bold" fill="#94A3B8" text-anchor="middle">VS</text>

    <!-- LEFT SIDE (BEFORE: Yellow, cloudy) -->
    <g transform="translate(-150, 0)">
      <text x="0" y="-100" font-size="24" font-weight="bold" fill="#FBBF24" text-anchor="middle">ก่อนขัด (เหลืองมัว)</text>
      <!-- Headlight Shape -->
      <path d="M-80,-50 C-40,-70 40,-70 80,-30 L80,30 C40,50 -40,50 -80,30 Z" fill="#453B25" stroke="#FBBF24" stroke-width="4" filter="url(#shadow-sm)"/>
      <path d="M-70,-40 C-35,-55 35,-55 70,-25 L70,25 C35,40 -35,40 -70,25 Z" fill="#6B511A" opacity="0.8"/>
      <!-- Foggy lens details -->
      <circle cx="-30" cy="-5" r="20" fill="#FDE68A" opacity="0.2"/>
      <circle cx="20" cy="0" r="25" fill="#FDE68A" opacity="0.2"/>
      <!-- Weak Light Beam -->
      <path d="M-60,0 L-180,-30 L-180,30 Z" fill="#FBBF24" opacity="0.15"/>
      <!-- Rain drops hitting the weak light -->
      <path d="M-100,-40 L-120,-10 M-140,-30 L-160,0 M-120,20 L-140,50" stroke="#00F2FE" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    </g>
    
    <!-- RIGHT SIDE (AFTER: Clear, bright) -->
    <g transform="translate(150, 0)">
      <text x="0" y="-100" font-size="24" font-weight="bold" fill="#00F2FE" text-anchor="middle">หลังขัด (ใสปิ๊ง)</text>
      <!-- Headlight Shape (mirrored) -->
      <path d="M80,-50 C40,-70 -40,-70 -80,-30 L-80,30 C-40,50 40,50 80,30 Z" fill="#0F172A" stroke="#00F2FE" stroke-width="4" filter="url(#shadow-sm)"/>
      <path d="M70,-40 C35,-55 -35,-55 -70,-25 L-70,25 C-35,40 35,40 70,25 Z" fill="#1E293B"/>
      <!-- Reflector and projector lens inside -->
      <circle cx="30" cy="-5" r="20" fill="#E2E8F0" stroke="#94A3B8" stroke-width="2"/>
      <circle cx="-20" cy="0" r="25" fill="#E2E8F0" stroke="#94A3B8" stroke-width="2"/>
      <circle cx="-20" cy="0" r="10" fill="#00F2FE" filter="url(#shadow-sm)"/>
      <!-- Strong Light Beam -->
      <path d="M60,0 L250,-60 L250,60 Z" fill="#00F2FE" opacity="0.4"/>
      <!-- Sparkles -->
      <path d="M50,-40 L60,-40 M55,-45 L55,-35" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
      <path d="M-50,30 L-40,30 M-45,25 L-45,35" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
      <!-- Rain drops reflecting off the strong light -->
      <path d="M120,-40 L100,-10 M160,-30 L140,0 M140,20 L120,50" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    </g>
    
  </g>
  
  <rect x="250" y="520" width="700" height="60" rx="30" fill="#0B0F19" stroke="#00F2FE" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">ไฟหน้าเหลือง แสงส่องไม่ทะลุฝน อันตรายมาก! ขัดให้ใสเพิ่มความปลอดภัย 100%</text>
</svg>
