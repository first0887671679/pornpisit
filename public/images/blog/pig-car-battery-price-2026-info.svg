<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#0B1120"/>
  <circle cx="1080" cy="90" r="220" fill="#F97316" opacity="0.12"/>
  <circle cx="120" cy="720" r="180" fill="#22D3EE" opacity="0.10"/>

  <text x="600" y="86" font-size="52" font-weight="800" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif">ราคาแบตเตอรี่รถยนต์ 2026 ขึ้นกับอะไร?</text>
  <text x="600" y="126" font-size="24" font-weight="400" fill="#94A3B8" text-anchor="middle" font-family="Arial, sans-serif">4 ปัจจัยหลักที่ทำให้รถแต่ละคันราคาไม่เท่ากัน</text>

  <rect x="80" y="180" width="240" height="220" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <circle cx="138" cy="236" r="28" fill="#1E293B" stroke="#F97316" stroke-width="2"/>
  <text x="138" y="246" font-size="28" font-weight="800" fill="#FB923C" text-anchor="middle" font-family="Arial, sans-serif">1</text>
  <text x="110" y="300" font-size="28" font-weight="800" fill="#FFFFFF" font-family="Arial, sans-serif">ประเภทแบตเตอรี่</text>
  <text x="110" y="340" font-size="20" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">น้ำ / MF / SMF</text>
  <text x="110" y="372" font-size="20" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">AGM / EFB</text>

  <rect x="350" y="180" width="240" height="220" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <circle cx="408" cy="236" r="28" fill="#1E293B" stroke="#22D3EE" stroke-width="2"/>
  <text x="408" y="246" font-size="28" font-weight="800" fill="#22D3EE" text-anchor="middle" font-family="Arial, sans-serif">2</text>
  <text x="380" y="300" font-size="28" font-weight="800" fill="#FFFFFF" font-family="Arial, sans-serif">ขนาดแอมป์ / CCA</text>
  <text x="380" y="340" font-size="20" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">45Ah, 65Ah, 75Ah</text>
  <text x="380" y="372" font-size="20" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">รถใหญ่ราคาสูงขึ้น</text>

  <rect x="620" y="180" width="240" height="220" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <circle cx="678" cy="236" r="28" fill="#1E293B" stroke="#F97316" stroke-width="2"/>
  <text x="678" y="246" font-size="28" font-weight="800" fill="#FB923C" text-anchor="middle" font-family="Arial, sans-serif">3</text>
  <text x="650" y="300" font-size="28" font-weight="800" fill="#FFFFFF" font-family="Arial, sans-serif">รุ่นรถ / ระบบไฟ</text>
  <text x="650" y="340" font-size="20" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">Eco Car, SUV</text>
  <text x="650" y="372" font-size="20" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">Start-Stop ต้องตรงสเปก</text>

  <rect x="890" y="180" width="230" height="220" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <circle cx="948" cy="236" r="28" fill="#1E293B" stroke="#22D3EE" stroke-width="2"/>
  <text x="948" y="246" font-size="28" font-weight="800" fill="#22D3EE" text-anchor="middle" font-family="Arial, sans-serif">4</text>
  <text x="920" y="300" font-size="28" font-weight="800" fill="#FFFFFF" font-family="Arial, sans-serif">บริการถึงที่</text>
  <text x="920" y="340" font-size="20" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">ค่าเดินทาง + เช็กระบบไฟ</text>
  <text x="920" y="372" font-size="20" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">สะดวกกว่า ไม่ต้องลากรถ</text>

  <rect x="80" y="470" width="1040" height="240" rx="34" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="120" y="530" font-size="30" font-weight="800" fill="#FFFFFF" font-family="Arial, sans-serif">ช่วงราคาโดยประมาณจากงานเปลี่ยนจริง</text>
  <text x="120" y="566" font-size="18" font-weight="400" fill="#94A3B8" font-family="Arial, sans-serif">อัปเดตปี 2026 ราคาอาจต่างกันตามยี่ห้อ วันผลิต และสเปกรถ</text>

  <rect x="120" y="600" width="280" height="74" rx="20" fill="#1E293B" stroke="#F97316" stroke-width="2"/>
  <text x="144" y="630" font-size="22" font-weight="800" fill="#FFFFFF" font-family="Arial, sans-serif">Eco Car / Sedan</text>
  <text x="144" y="655" font-size="16" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">Yaris, City, Vios, Almera</text>
  <text x="374" y="648" font-size="30" font-weight="800" fill="#FB923C" text-anchor="end" font-family="Arial, sans-serif">2,2xx - 3,2xx</text>

  <rect x="460" y="600" width="280" height="74" rx="20" fill="#1E293B" stroke="#22D3EE" stroke-width="2"/>
  <text x="484" y="630" font-size="22" font-weight="800" fill="#FFFFFF" font-family="Arial, sans-serif">SUV / PPV / กระบะ</text>
  <text x="484" y="655" font-size="16" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">Fortuner, MU-X, D-Max</text>
  <text x="714" y="648" font-size="30" font-weight="800" fill="#22D3EE" text-anchor="end" font-family="Arial, sans-serif">2,8xx - 4,2xx</text>

  <rect x="800" y="600" width="280" height="74" rx="20" fill="#1E293B" stroke="#F97316" stroke-width="2"/>
  <text x="824" y="630" font-size="22" font-weight="800" fill="#FFFFFF" font-family="Arial, sans-serif">รถ Start-Stop</text>
  <text x="824" y="655" font-size="16" font-weight="400" fill="#CBD5E1" font-family="Arial, sans-serif">AGM / EFB ตามสเปกโรงงาน</text>
  <text x="1054" y="648" font-size="30" font-weight="800" fill="#FB923C" text-anchor="end" font-family="Arial, sans-serif">4,5xx - 9,5xx</text>
</svg>
