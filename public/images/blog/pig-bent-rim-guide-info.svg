<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');
      text { font-family: 'Prompt', sans-serif; }
      @keyframes vibrate-wheel {
        0% { transform: translate(0, 0); }
        20% { transform: translate(-3px, 2px); }
        40% { transform: translate(3px, -2px); }
        60% { transform: translate(-3px, -2px); }
        80% { transform: translate(3px, 2px); }
        100% { transform: translate(0, 0); }
      }
      .wheel-shake {
        animation: vibrate-wheel 0.1s infinite;
      }
    </style>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-red)"/>
  
  <!-- Bent Rim & Pothole Impact Graphic -->
  <g transform="translate(600, 315) scale(1.8)">
    
    <!-- Action lines / Impact -->
    <path d="M-100,-80 L-140,-120 M100,-80 L140,-120 M-120,0 L-160,0 M120,0 L160,0 M-100,80 L-140,120 M100,80 L140,120" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10,15" opacity="0.5"/>

    <g class="wheel-shake">
      <!-- Tire outline (flat/deflated at bottom) -->
      <path d="M-80,0 C-80,-45 -45,-80 0,-80 C45,-80 80,-45 80,0 C80,30 65,55 45,70 C25,85 -25,85 -45,70 C-65,55 -80,30 -80,0 Z" fill="#1E293B" stroke="#0F172A" stroke-width="8" filter="url(#shadow-sm)"/>
      <path d="M-70,0 C-70,-40 -40,-70 0,-70 C40,-70 70,-40 70,0 C70,25 55,45 35,55 C15,65 -15,65 -35,55 C-55,45 -70,25 -70,0 Z" fill="none" stroke="#334155" stroke-width="2"/>
      
      <!-- Alloy Wheel -->
      <path d="M-55,0 C-55,-30 -30,-55 0,-55 C30,-55 55,-30 55,0 C55,15 45,30 30,40 C15,50 -5,55 -25,45 C-45,35 -55,15 -55,0 Z" fill="#94A3B8" stroke="#E2E8F0" stroke-width="4"/>
      
      <!-- Wheel Spokes -->
      <g stroke="#334155" stroke-width="8" stroke-linecap="round">
        <path d="M0,0 L0,-55"/>
        <path d="M0,0 L45,-30"/>
        <path d="M0,0 L45,30"/>
        <!-- Bent spokes at impact point -->
        <path d="M0,0 L-10,35 L-20,45" stroke="#1E293B"/>
        <path d="M0,0 L-45,-30"/>
        <path d="M0,0 L-50,15" stroke="#1E293B"/>
      </g>
      
      <!-- Center Cap -->
      <circle cx="0" cy="0" r="12" fill="#0B0F19"/>
      
      <!-- Damage / Bent Area Highlight -->
      <path d="M-45,15 Q-20,45 5,52" fill="none" stroke="#EF4444" stroke-width="6" stroke-linecap="round"/>
      <!-- Crack on spoke -->
      <path d="M-12,25 L-20,28 L-18,35" fill="none" stroke="#0B0F19" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Cross marker over damage -->
    <g transform="translate(-25, 45)">
      <circle cx="0" cy="0" r="15" fill="#EF4444"/>
      <path d="M-6,-6 L6,6 M-6,6 L6,-6" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Shockwaves from bottom left (pothole impact) -->
    <path d="M-60,70 Q-40,50 -20,70" fill="none" stroke="#FF6B00" stroke-width="4" stroke-linecap="round"/>
    <path d="M-70,80 Q-40,55 -10,80" fill="none" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <rect x="250" y="520" width="700" height="60" rx="30" fill="#0B0F19" stroke="#EF4444" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">ล้อแม็กดุ้ง พวงมาลัยสั่น ลมยางซึม! สัญญาณเตือนหลังขับตกหลุมอย่างแรง</text>
</svg>
