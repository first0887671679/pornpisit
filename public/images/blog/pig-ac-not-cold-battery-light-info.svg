<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <style>@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');text{font-family:'Prompt',sans-serif;}</style>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-red)"/>
  
  <!-- Dashboard Warning Graphic -->
  <g transform="translate(600, 280) scale(1.8)">
    <!-- Dashboard outline -->
    <path d="M-200,0 Q0,-100 200,0 L220,100 L-220,100 Z" fill="#0B0F19" stroke="#334155" stroke-width="4" filter="url(#shadow-sm)"/>
    
    <!-- Steering wheel top -->
    <path d="M-120,100 Q0,20 120,100" fill="none" stroke="#1E293B" stroke-width="25"/>
    
    <!-- Battery Warning Light (Center & Large) -->
    <g transform="translate(0, -10)">
      <rect x="-35" y="-25" width="70" height="50" rx="6" fill="none" stroke="#EF4444" stroke-width="5"/>
      <rect x="-15" y="-32" width="10" height="7" fill="#EF4444"/>
      <rect x="5" y="-32" width="10" height="7" fill="#EF4444"/>
      <path d="M-20,0 L-5,0 M-12.5,-7.5 L-12.5,7.5 M5,0 L20,0" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
      <!-- Glowing effect -->
      <circle cx="0" cy="0" r="50" fill="#EF4444" opacity="0.2">
        <animate attributeName="opacity" values="0.1;0.4;0.1" dur="1s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Air Con Vents (Sides) with hot air -->
    <g transform="translate(-140, 20)">
      <rect x="-30" y="-15" width="60" height="30" rx="4" fill="#1E293B" stroke="#334155" stroke-width="2"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#0F172A" stroke-width="3"/>
      <!-- Hot air waves coming out -->
      <path d="M-10,-25 Q0,-35 10,-25" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.6"/>
      <path d="M-5,-35 Q5,-45 15,-35" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.6"/>
    </g>
    
    <g transform="translate(140, 20)">
      <rect x="-30" y="-15" width="60" height="30" rx="4" fill="#1E293B" stroke="#334155" stroke-width="2"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#0F172A" stroke-width="3"/>
      <!-- Hot air waves coming out -->
      <path d="M-10,-25 Q0,-35 10,-25" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.6"/>
      <path d="M-5,-35 Q5,-45 15,-35" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.6"/>
    </g>
  </g>
  
  <rect x="250" y="520" width="700" height="60" rx="30" fill="#0B0F19" stroke="#EF4444" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="24" font-weight="600" fill="#FFFFFF" text-anchor="middle">สัญญาณเตือน "ไดชาร์จพัง" ให้ปิดแอร์ ปิดวิทยุ แล้วรีบหาที่จอดทันที!</text>
</svg>
