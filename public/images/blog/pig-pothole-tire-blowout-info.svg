<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');
    text { font-family: 'Prompt', sans-serif; }
    @keyframes pulse-warning {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
    .warning-pulse {
      animation: pulse-warning 1s infinite;
    }
  </style>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-red)"/>
  
  <!-- Pothole & Blown Tire Graphic -->
  <g transform="translate(600, 315) scale(1.6)">
    
    <!-- Dark Road/Asphalt -->
    <path d="M-300,50 L300,50 L350,150 L-350,150 Z" fill="#0B0F19" filter="url(#shadow-sm)"/>
    <path d="M-300,50 L300,50" stroke="#334155" stroke-width="4"/>
    
    <!-- Deep Pothole -->
    <ellipse cx="0" cy="110" rx="120" ry="30" fill="#050914" stroke="#1E293B" stroke-width="4"/>
    <path d="M-120,110 C-100,140 -50,150 0,150 C50,150 100,140 120,110 C100,130 50,140 0,140 C-50,140 -100,130 -120,110" fill="#0F172A"/>
    <!-- Cracks around pothole -->
    <path d="M-130,110 L-180,90 M-80,80 L-100,50 M130,110 L190,120 M80,80 L120,60" fill="none" stroke="#1E293B" stroke-width="3"/>

    <!-- Damaged Wheel & Tire inside pothole -->
    <g transform="translate(0, 90)">
      <!-- Bent Alloy Wheel -->
      <path d="M-50,0 C-50,-25 -25,-50 0,-50 C25,-50 50,-25 50,0 C50,20 20,40 0,40 C-20,40 -50,20 -50,0 Z" fill="#94A3B8" stroke="#E2E8F0" stroke-width="3"/>
      <!-- Wheel Spokes (bent at bottom) -->
      <path d="M0,0 L-35,-35 M0,0 L35,-35 M0,0 L45,0 M0,0 L-45,0 M0,0 L-25,35 M0,0 L25,35" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="10" fill="#0B0F19"/>
      
      <!-- Blown Tire / Shredded Rubber -->
      <path d="M-60,0 C-60,-30 -30,-60 0,-60 C30,-60 60,-30 60,0 C60,15 40,30 25,45 L15,35 L5,50 L-5,35 L-15,45 C-30,30 -60,15 -60,0 Z" fill="none" stroke="#1E293B" stroke-width="15"/>
      <path d="M-60,0 C-60,-30 -30,-60 0,-60 C30,-60 60,-30 60,0" fill="none" stroke="#0B0F19" stroke-width="10"/>
      <!-- Impact point / Tear -->
      <path d="M-20,40 L-10,30 L0,45 L10,30 L20,40" fill="none" stroke="#EF4444" stroke-width="4" stroke-linejoin="round"/>
    </g>

    <!-- Speed/Impact Action Lines -->
    <path d="M-80,-20 L-40,40 M80,-20 L40,40 M0,-40 L0,20" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="10,10" opacity="0.6"/>
    
    <!-- Warning Sign -->
    <g transform="translate(-180, 20)" class="warning-pulse">
      <path d="M0,-30 L30,20 L-30,20 Z" fill="#EF4444" filter="url(#shadow-sm)"/>
      <circle cx="0" cy="5" r="15" fill="#FFFFFF"/>
      <path d="M-2,-5 L2,-5 L1,3 L-1,3 Z M-2,6 L2,6 L2,10 L-2,10 Z" fill="#EF4444"/>
    </g>
  </g>
  
  <rect x="250" y="520" width="700" height="60" rx="30" fill="#0B0F19" stroke="#EF4444" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">แก้มยางฉีก แม็กดุ้งจากแรงกระแทก... "ปะไม่ได้ ต้องเปลี่ยนยางอะไหล่เท่านั้น!"</text>
</svg>
