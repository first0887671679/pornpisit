<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <!-- Shaking animation for the engine/tachometer -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');
      text { font-family: 'Prompt', sans-serif; }
      @keyframes vibrate {
        0% { transform: translate(0, 0); }
        20% { transform: translate(-4px, 4px); }
        40% { transform: translate(-4px, -4px); }
        60% { transform: translate(4px, 4px); }
        80% { transform: translate(4px, -4px); }
        100% { transform: translate(0, 0); }
      }
      .vibrating {
        animation: vibrate 0.2s infinite;
      }
      @keyframes needleDrop {
        0% { transform: rotate(15deg); }
        50% { transform: rotate(-25deg); }
        100% { transform: rotate(15deg); }
      }
      .needle-move {
        animation: needleDrop 1.5s infinite ease-in-out;
        transform-origin: center;
      }
    </style>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-orange)"/>
  <circle cx="200" cy="315" r="300" fill="url(#glow-blue)"/>
  
  <!-- Dashboard/Tachometer Graphic -->
  <g transform="translate(600, 280) scale(1.6)">
    <g class="vibrating">
      <!-- RPM Gauge Background -->
      <circle cx="-100" cy="0" r="100" fill="#0B0F19" stroke="#334155" stroke-width="6" filter="url(#shadow-sm)"/>
      <path d="M-180,60 A 85 85 0 1 1 -20,60" fill="none" stroke="#1E293B" stroke-width="12" stroke-linecap="round"/>
      
      <!-- RPM Zones -->
      <!-- Red zone (High RPM) -->
      <path d="M-40,-60 A 85 85 0 0 1 -20,60" fill="none" stroke="#EF4444" stroke-width="12" stroke-linecap="round"/>
      <!-- Warning zone (Low RPM/Stalling) -->
      <path d="M-180,60 A 85 85 0 0 1 -170,20" fill="none" stroke="#FF6B00" stroke-width="12" stroke-linecap="round"/>
      
      <text x="-100" y="40" font-size="16" fill="#94A3B8" font-weight="bold" text-anchor="middle">RPM x1000</text>
      
      <!-- Center Pin -->
      <circle cx="-100" cy="0" r="10" fill="#E2E8F0"/>
      <circle cx="-100" cy="0" r="4" fill="#0B0F19"/>
      
      <!-- Needle (animated) -->
      <g transform="translate(-100, 0)">
        <g class="needle-move">
          <path d="M-5,0 L0,-75 L5,0 Z" fill="#EF4444" filter="url(#shadow-sm)"/>
        </g>
      </g>
      
      <!-- Engine Warning Light (Check Engine) -->
      <path d="M-130,-40 L-120,-40 L-120,-45 L-110,-45 L-100,-35 L-80,-35 L-75,-25 L-70,-25 L-70,-15 L-80,-15 L-80,-10 L-110,-10 L-120,-20 L-130,-20 Z" fill="none" stroke="#FBBF24" stroke-width="3"/>
      <text x="-100" y="-20" font-size="10" fill="#FBBF24" font-weight="bold" text-anchor="middle">CHECK</text>

      <!-- AC ON Icon -->
      <g transform="translate(100, 0)">
        <rect x="-40" y="-30" width="80" height="60" rx="10" fill="#1E293B" stroke="#00F2FE" stroke-width="3" filter="url(#shadow-sm)"/>
        <text x="0" y="5" font-size="24" fill="#00F2FE" font-weight="bold" text-anchor="middle">A/C</text>
        <circle cx="20" cy="15" r="4" fill="#10B981"/> <!-- Green ON light -->
        <path d="M-50,0 Q-60,-10 -70,0" fill="none" stroke="#00F2FE" stroke-width="3" stroke-linecap="round"/>
        <path d="M-50,15 Q-60,5 -70,15" fill="none" stroke="#00F2FE" stroke-width="3" stroke-linecap="round"/>
        <path d="M-50,-15 Q-60,-25 -70,-15" fill="none" stroke="#00F2FE" stroke-width="3" stroke-linecap="round"/>
      </g>
    </g>
  </g>
  
  <rect x="250" y="520" width="700" height="60" rx="30" fill="#0B0F19" stroke="#FF6B00" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">เปิดแอร์แล้วรอบตก เครื่องสั่นเป็นเจ้าเข้า! แบตเสื่อม หรือ ปีกผีเสื้อสกปรก?</text>
</svg>
