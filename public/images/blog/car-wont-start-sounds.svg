<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="70" y="92" fill="#0F172A" font-size="46" font-weight="800" font-family="Arial, sans-serif">เสียงแบบไหน? บอกอะไรเราได้บ้าง</text>
  <text x="70" y="136" fill="#64748B" font-size="22" font-family="Arial, sans-serif">แยกแยะอาการรถสตาร์ทไม่ติด จาก "เสียง" เวลาบิดกุญแจ</text>

  <rect x="70" y="188" width="330" height="430" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="110" y="240" width="250" height="80" rx="16" fill="#FEF2F2"/>
  <text x="235" y="290" fill="#DC2626" font-size="32" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">เงียบกริบ!</text>
  <text x="110" y="380" fill="#0F172A" font-size="28" font-weight="800" font-family="Arial, sans-serif">ไฟไม่เข้าเลย</text>
  <text x="110" y="420" fill="#475569" font-size="22" font-family="Arial, sans-serif">• แบตเตอรี่อาจหมดเกลี้ยง</text>
  <text x="110" y="460" fill="#475569" font-size="22" font-family="Arial, sans-serif">• ขั้วแบตหลวม/สกปรก</text>
  <text x="110" y="500" fill="#475569" font-size="22" font-family="Arial, sans-serif">• ฟิวส์เมนขาด</text>
  <rect x="110" y="540" width="250" height="40" rx="8" fill="#FEE2E2"/>
  <text x="235" y="567" fill="#DC2626" font-size="18" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">ลองเปิดไฟหน้าเช็กดู</text>

  <rect x="435" y="188" width="330" height="430" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="475" y="240" width="250" height="80" rx="16" fill="#FFF7ED"/>
  <text x="600" y="290" fill="#EA580C" font-size="32" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">แชะ..แชะ..แชะ (รัวๆ)</text>
  <text x="475" y="380" fill="#0F172A" font-size="28" font-weight="800" font-family="Arial, sans-serif">ไดสตาร์ทหมุนไม่ออก</text>
  <text x="475" y="420" fill="#475569" font-size="22" font-family="Arial, sans-serif">• แบตเตอรี่เสื่อม (ไฟอ่อน)</text>
  <text x="475" y="460" fill="#475569" font-size="22" font-family="Arial, sans-serif">• ไดสตาร์ทเริ่มมีปัญหา</text>
  <text x="475" y="500" fill="#475569" font-size="22" font-family="Arial, sans-serif">• แปรงถ่านไดสตาร์ทหมด</text>
  <rect x="475" y="540" width="250" height="40" rx="8" fill="#FFEDD5"/>
  <text x="600" y="567" fill="#EA580C" font-size="18" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">พ่วงแบตอาจช่วยได้</text>

  <rect x="800" y="188" width="330" height="430" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="840" y="240" width="250" height="80" rx="16" fill="#EFF6FF"/>
  <text x="965" y="290" fill="#2563EB" font-size="32" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">ชึ่ง..ชึ่ง..ชึ่ง (หมุนปกติ)</text>
  <text x="840" y="380" fill="#0F172A" font-size="28" font-weight="800" font-family="Arial, sans-serif">แต่เครื่องไม่ติด!</text>
  <text x="840" y="420" fill="#475569" font-size="22" font-family="Arial, sans-serif">• น้ำมันหมด/ปั๊มติ๊กพัง</text>
  <text x="840" y="460" fill="#475569" font-size="22" font-family="Arial, sans-serif">• ระบบจุดระเบิดมีปัญหา</text>
  <text x="840" y="500" fill="#475569" font-size="22" font-family="Arial, sans-serif">• เซนเซอร์เพลาข้อเหวี่ยง</text>
  <rect x="840" y="540" width="250" height="40" rx="8" fill="#DBEAFE"/>
  <text x="965" y="567" fill="#2563EB" font-size="18" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">ไม่ได้เป็นที่แบตเตอรี่!</text>
</svg>
