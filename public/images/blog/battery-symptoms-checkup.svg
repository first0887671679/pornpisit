<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="70" y="92" fill="#0F172A" font-size="46" font-weight="800" font-family="Arial, Noto Sans Thai, sans-serif">เช็กให้ชัด: แบตเตอรี่เสื่อม หรือไดชาร์จมีปัญหา?</text>
  <text x="70" y="136" fill="#64748B" font-size="22" font-family="Arial, Noto Sans Thai, sans-serif">ภาพสรุปเพื่อช่วยอธิบายความต่างแบบเข้าใจง่าย</text>

  <rect x="84" y="188" width="472" height="452" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="124" y="248" fill="#0F172A" font-size="34" font-weight="800" font-family="Arial, Noto Sans Thai, sans-serif">อาการแบตเตอรี่เสื่อม</text>
  <rect x="124" y="284" width="152" height="176" rx="22" fill="#0F172A"/>
  <rect x="136" y="296" width="128" height="152" rx="18" fill="#FFF7ED"/>
  <rect x="180" y="254" width="18" height="30" rx="6" fill="#0F172A"/>
  <rect x="206" y="254" width="18" height="30" rx="6" fill="#0F172A"/>
  <rect x="150" y="380" width="100" height="48" rx="12" fill="url(#warn)"/>
  <text x="314" y="334" fill="#475569" font-size="24" font-family="Arial, Noto Sans Thai, sans-serif">• สตาร์ทช้า</text>
  <text x="314" y="378" fill="#475569" font-size="24" font-family="Arial, Noto Sans Thai, sans-serif">• ไฟอ่อนลง</text>
  <text x="314" y="422" fill="#475569" font-size="24" font-family="Arial, Noto Sans Thai, sans-serif">• จอดทิ้งไว้แล้วสตาร์ทไม่ติด</text>
  <text x="124" y="534" fill="#EA580C" font-size="26" font-weight="700" font-family="Arial, Noto Sans Thai, sans-serif">แนวทาง:</text>
  <text x="234" y="534" fill="#475569" font-size="24" font-family="Arial, Noto Sans Thai, sans-serif">เปลี่ยนแบตเตอรี่ลูกใหม่</text>

  <rect x="644" y="188" width="472" height="452" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="684" y="248" fill="#0F172A" font-size="34" font-weight="800" font-family="Arial, Noto Sans Thai, sans-serif">อาการไดชาร์จมีปัญหา</text>
  <circle cx="806" cy="368" r="88" fill="#DBEAFE"/>
  <circle cx="806" cy="368" r="48" fill="#60A5FA"/>
  <circle cx="806" cy="368" r="18" fill="#FFFFFF"/>
  <rect x="768" y="288" width="76" height="14" rx="7" fill="#2563EB"/>
  <rect x="768" y="434" width="76" height="14" rx="7" fill="#2563EB"/>
  <rect x="726" y="332" width="14" height="76" rx="7" fill="#2563EB"/>
  <rect x="872" y="332" width="14" height="76" rx="7" fill="#2563EB"/>
  <text x="924" y="334" fill="#475569" font-size="24" font-family="Arial, Noto Sans Thai, sans-serif">• พ่วงแบตแล้วติด</text>
  <text x="924" y="378" fill="#475569" font-size="24" font-family="Arial, Noto Sans Thai, sans-serif">• ถอดสายพ่วงแล้วดับ</text>
  <text x="924" y="422" fill="#475569" font-size="24" font-family="Arial, Noto Sans Thai, sans-serif">• ไฟเตือนแบตขึ้นตอนวิ่ง</text>
  <text x="684" y="534" fill="#16A34A" font-size="26" font-weight="700" font-family="Arial, Noto Sans Thai, sans-serif">แนวทาง:</text>
  <text x="792" y="534" fill="#475569" font-size="24" font-family="Arial, Noto Sans Thai, sans-serif">ตรวจไดชาร์จและระบบชาร์จไฟ</text>

  <rect x="420" y="618" width="360" height="50" rx="16" fill="#FFFFFF" stroke="#FDBA74"/>
  <text x="454" y="651" fill="#0F172A" font-size="24" font-weight="700" font-family="Arial, Noto Sans Thai, sans-serif">ช่างควรวัดค่าแบต + ระบบชาร์จ ก่อนสรุปอาการ</text>
</svg>
