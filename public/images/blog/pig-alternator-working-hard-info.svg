<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');
    text { font-family: 'Prompt', sans-serif; }
    @keyframes pulse-heat {
      0% { fill: #EF4444; stroke: #FF6B00; }
      50% { fill: #DC2626; stroke: #EF4444; }
      100% { fill: #EF4444; stroke: #FF6B00; }
    }
    .hot-part {
      animation: pulse-heat 2s infinite;
    }
  </style>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-orange)"/>
  
  <!-- Alternator Working Hard Graphic -->
  <g transform="translate(600, 270) scale(1.8)">
    
    <!-- Engine Belt System -->
    <path d="M-120,-20 Q-150,50 -100,100 L100,100 Q150,50 120,-20 Z" fill="none" stroke="#334155" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Pulley 1 (Crankshaft) -->
    <circle cx="0" cy="80" r="30" fill="#1E293B" stroke="#475569" stroke-width="4"/>
    <circle cx="0" cy="80" r="10" fill="#0F172A"/>
    
    <!-- Pulley 2 (AC Compressor - Heavy Load) -->
    <g transform="translate(100, 0)">
      <circle cx="0" cy="0" r="25" fill="#1E293B" stroke="#00F2FE" stroke-width="4"/>
      <circle cx="0" cy="0" r="8" fill="#0F172A"/>
      <path d="M-15,-15 L15,15 M-15,15 L15,-15" stroke="#00F2FE" stroke-width="2"/>
      <!-- Snow flake to represent AC -->
      <text x="0" y="35" font-size="12" fill="#00F2FE" font-weight="bold" text-anchor="middle">A/C ON</text>
    </g>
    
    <!-- Pulley 3 (Alternator - Overheating) -->
    <g transform="translate(-100, 0)">
      <circle cx="0" cy="0" r="28" fill="#1E293B" stroke="#EF4444" stroke-width="4" class="hot-part"/>
      <!-- Coil visible inside -->
      <circle cx="0" cy="0" r="15" fill="#B45309" stroke="#92400E" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="#0F172A"/>
      
      <!-- Electricity arrows -->
      <path d="M-10,-40 L0,-25 L-5,-25 L5,-10" fill="none" stroke="#FBBF24" stroke-width="3" stroke-linejoin="round"/>
      <path d="M15,-30 L25,-15 L20,-15 L30,0" fill="none" stroke="#FBBF24" stroke-width="3" stroke-linejoin="round"/>
      
      <!-- Heat Waves -->
      <path d="M-25,-35 Q-15,-50 -25,-65" fill="none" stroke="#EF4444" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
      <path d="M0,-45 Q10,-60 0,-75" fill="none" stroke="#FF6B00" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
      <path d="M25,-35 Q35,-50 25,-65" fill="none" stroke="#EF4444" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
      
      <text x="0" y="40" font-size="14" fill="#EF4444" font-weight="bold" text-anchor="middle">OVERLOAD!</text>
    </g>

    <!-- Load Connection Lines -->
    <path d="M-100,-40 Q0,-80 100,-40" fill="none" stroke="#EF4444" stroke-width="4" stroke-dasharray="8,8" opacity="0.6">
      <animate attributeName="stroke-dashoffset" values="50;0" dur="1s" repeatCount="indefinite"/>
    </path>
    
  </g>
  
  <rect x="250" y="520" width="700" height="60" rx="30" fill="#0B0F19" stroke="#FF6B00" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">เปิดแอร์เบอร์สุด + รถติดนานๆ = ไดชาร์จต้องปั่นไฟชดเชยจนร้อนจัด!</text>
</svg>
