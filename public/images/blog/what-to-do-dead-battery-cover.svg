<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF2F2"/>
      <stop offset="1" stop-color="#FEE2E2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FEF2F2" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#7F1D1D" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="24" fill="url(#bg)"/>
  
  <path d="M1200 0L0 630V0H1200Z" fill="#FECACA" fill-opacity="0.3"/>
  <circle cx="1050" cy="150" r="200" fill="#DC2626" fill-opacity="0.05"/>
  <circle cx="150" cy="480" r="150" fill="#F97316" fill-opacity="0.05"/>

  <rect x="60" y="60" width="1080" height="510" rx="32" fill="url(#panel)" filter="url(#shadow)"/>

  <g transform="translate(100 120)">
    <rect x="0" y="0" width="220" height="40" rx="20" fill="#DC2626" fill-opacity="0.1"/>
    <text x="110" y="26" fill="#DC2626" font-size="18" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">อัปเดตวิธีแก้ปัญหา 2026</text>
    
    <text x="0" y="100" fill="#0F172A" font-size="64" font-weight="800" font-family="Arial, sans-serif">แบตหมดทำไง?</text>
    <text x="0" y="170" fill="#334155" font-size="36" font-weight="700" font-family="Arial, sans-serif">วิธีแก้ปัญหาเฉพาะหน้า เมื่อรถสตาร์ทไม่ติด</text>
    <text x="0" y="230" fill="#64748B" font-size="24" font-family="Arial, sans-serif">พ่วงแบตที่ถูกต้อง • ข้อควรระวัง • เรียกช่างฉุกเฉิน</text>

    <g transform="translate(0 300)">
      <rect x="0" y="0" width="250" height="120" rx="24" fill="#FFFFFF" stroke="#FECACA" stroke-width="2"/>
      <text x="125" y="55" fill="#EF4444" font-size="36" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">1</text>
      <text x="125" y="90" fill="#0F172A" font-size="22" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">ตั้งสติ เปิดไฟฉุกเฉิน</text>
      
      <rect x="270" y="0" width="250" height="120" rx="24" fill="#FFFFFF" stroke="#FECACA" stroke-width="2"/>
      <text x="395" y="55" fill="#EF4444" font-size="36" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">2</text>
      <text x="395" y="90" fill="#0F172A" font-size="22" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">หารถพ่วง / จั๊มสตาร์ท</text>

      <rect x="540" y="0" width="250" height="120" rx="24" fill="#FFFFFF" stroke="#FECACA" stroke-width="2"/>
      <text x="665" y="55" fill="#EF4444" font-size="36" font-weight="800" font-family="Arial, sans-serif" text-anchor="middle">3</text>
      <text x="665" y="90" fill="#0F172A" font-size="22" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle">เปลี่ยนแบตนอกสถานที่</text>
    </g>
  </g>
</svg>
