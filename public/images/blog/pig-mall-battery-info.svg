<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <style>@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');text{font-family:'Prompt',sans-serif;}</style>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-blue)"/>
  
  <!-- Motorcycle Mechanic in Parking Lot Graphic -->
  <g transform="translate(600, 300) scale(1.5)">
    <!-- Parking Column -->
    <rect x="-200" y="-120" width="80" height="250" fill="#1E293B" filter="url(#shadow-sm)"/>
    <path d="M-200,-50 L-120,-10 M-200,0 L-120,40 M-200,50 L-120,90 M-200,100 L-120,140" stroke="#FFD700" stroke-width="20" opacity="0.8"/>
    <text x="-160" y="-80" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2B</text>
    
    <!-- Stranded Car (Silhouette) -->
    <path d="M100,50 L180,50 L200,10 L300,10 L320,50 L380,50 L390,90 L90,90 Z" fill="#0F172A" stroke="#334155" stroke-width="2" opacity="0.9"/>
    <circle cx="150" cy="90" r="25" fill="#050914" stroke="#475569" stroke-width="4"/>
    <circle cx="330" cy="90" r="25" fill="#050914" stroke="#475569" stroke-width="4"/>
    
    <!-- Open Hood -->
    <path d="M100,50 L180,50 L150,0 Z" fill="#1E293B" opacity="0.8"/>
    
    <!-- Warning Light on Car -->
    <circle cx="120" cy="65" r="5" fill="#FF6B00">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Fast Motorcycle Arriving -->
    <g transform="translate(-20, 50)">
      <!-- Speed lines -->
      <path d="M-150,0 L-50,0 M-130,-20 L-40,-20 M-140,20 L-60,20" fill="none" stroke="#00F2FE" stroke-width="3" stroke-linecap="round" opacity="0.6">
        <animate attributeName="stroke-dashoffset" values="100;0" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="stroke-dasharray" values="50,50" dur="1s" repeatCount="indefinite"/>
      </path>
      
      <!-- Motorcycle Body -->
      <path d="M-30,20 L20,20 L30,0 L0,-20 L-20,-10 Z" fill="#FF6B00" filter="url(#shadow-sm)"/>
      <circle cx="-20" cy="20" r="15" fill="#0B0F19" stroke="#94A3B8" stroke-width="2"/>
      <circle cx="20" cy="20" r="15" fill="#0B0F19" stroke="#94A3B8" stroke-width="2"/>
      <!-- Delivery Box (carrying battery) -->
      <rect x="-45" y="-30" width="30" height="30" rx="4" fill="#00F2FE" opacity="0.9" filter="url(#shadow-sm)"/>
      <path d="M-35,-20 L-25,-20 M-30,-25 L-30,-15" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    </g>
  </g>
  
  <rect x="250" y="520" width="700" height="60" rx="30" fill="#0B0F19" stroke="#00F2FE" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="24" font-weight="600" fill="#FFFFFF" text-anchor="middle">รถยกเข้าไม่ได้? เราใช้มอเตอร์ไซค์พร้อมแบตเตอรี่ลูกใหม่ เข้าถึงรถคุณได้ทันที!</text>
</svg>
