<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <style>@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');text{font-family:'Prompt',sans-serif;}</style>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-red)"/>
  
  <!-- Swollen Battery Graphic in Center -->
  <g transform="translate(600, 315) scale(2.5)">
    <!-- Heat waves -->
    <path d="M-40,-45 Q-30,-60 -40,-75 Q-50,-90 -40,-105" fill="none" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M0,-50 Q10,-65 0,-80 Q-10,-95 0,-110" fill="none" stroke="#EF4444" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
    </path>
    <path d="M40,-45 Q50,-60 40,-75 Q30,-90 40,-105" fill="none" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite" />
    </path>
    
    <!-- Swollen Battery Body -->
    <path d="M-50,-40 Q-80,0 -50,40 L50,40 Q80,0 50,-40 Z" fill="#1E293B" stroke="#EF4444" stroke-width="4" filter="url(#shadow-sm)"/>
    <rect x="-35" y="-48" width="20" height="8" fill="#EF4444"/>
    <rect x="15" y="-48" width="20" height="8" fill="#94A3B8"/>
    
    <!-- Warning Sign -->
    <path d="M0,-20 L25,20 L-25,20 Z" fill="#EF4444" filter="url(#shadow-sm)"/>
    <circle cx="0" cy="5" r="12" fill="#FFFFFF"/>
    <path d="M-2,-3 L2,-3 L1,3 L-1,3 Z M-2,6 L2,6 L2,10 L-2,10 Z" fill="#EF4444"/>
    
    <!-- Pressure lines -->
    <path d="M-60,0 L-70,0 M60,0 L70,0 M-55,-20 L-62,-25 M55,-20 L62,-25 M-55,20 L-62,25 M55,20 L62,25" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <rect x="350" y="520" width="500" height="60" rx="30" fill="#0B0F19" stroke="#EF4444" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="24" font-weight="600" fill="#FFFFFF" text-anchor="middle">อันตราย! อย่าฝืนขับ หรือจัมพ์แบตเตอรี่เด็ดขาด</text>
</svg>
