<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="panelLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78909C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#546E7A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="panelRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shineEffect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:white;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#F5F5F5"/>

  <!-- Left panel: Before (with stains) -->
  <g transform="translate(50, 40)">
    <rect width="320" height="340" rx="20" fill="url(#panelLeft)" filter="url(#shadow2)"/>
    <!-- Stain marks -->
    <ellipse cx="80" cy="100" rx="35" ry="15" fill="#A1887F" opacity="0.5"/>
    <ellipse cx="200" cy="80" rx="28" ry="18" fill="#BCAAA4" opacity="0.45"/>
    <ellipse cx="150" cy="150" rx="40" ry="12" fill="#8D6E63" opacity="0.4"/>
    <ellipse cx="250" cy="130" rx="22" ry="20" fill="#A1887F" opacity="0.5"/>
    <ellipse cx="100" cy="200" rx="30" ry="14" fill="#BCAAA4" opacity="0.5"/>
    <ellipse cx="220" cy="220" rx="35" ry="10" fill="#8D6E63" opacity="0.45"/>
    <ellipse cx="160" cy="260" rx="25" ry="16" fill="#A1887F" opacity="0.4"/>
    <!-- Ring-shaped water spots -->
    <circle cx="120" cy="120" r="15" fill="none" stroke="#8D6E63" stroke-width="2" opacity="0.4"/>
    <circle cx="240" cy="180" r="12" fill="none" stroke="#A1887F" stroke-width="2" opacity="0.35"/>
    <circle cx="70" cy="250" r="10" fill="none" stroke="#8D6E63" stroke-width="1.5" opacity="0.4"/>
    <circle cx="270" cy="270" r="14" fill="none" stroke="#BCAAA4" stroke-width="2" opacity="0.35"/>
    <!-- Sad face icon -->
    <circle cx="160" cy="290" r="20" fill="#EF5350" opacity="0.8"/>
    <text x="160" y="296" text-anchor="middle" font-size="20" fill="white">✕</text>
    <!-- Label -->
    <rect x="60" y="305" width="200" height="30" rx="10" fill="#D32F2F" opacity="0.9"/>
    <text x="160" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">ก่อนขัด: คราบน้ำฝังแน่น</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(390, 180)">
    <polygon points="0,0 30,20 0,40 8,20" fill="#FF9800" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Right panel: After (clean & shiny) -->
  <g transform="translate(430, 40)">
    <rect width="320" height="340" rx="20" fill="url(#panelRight)" filter="url(#shadow2)"/>
    <!-- Shine/gloss overlay -->
    <rect width="320" height="340" rx="20" fill="url(#shineEffect)"/>
    <!-- Sparkle effects -->
    <g opacity="0.8">
      <text x="80" y="100" font-size="24" fill="white" opacity="0.9">✦</text>
      <text x="200" y="80" font-size="18" fill="white" opacity="0.7">✧</text>
      <text x="150" y="160" font-size="28" fill="white" opacity="0.85">✦</text>
      <text x="250" y="140" font-size="16" fill="white" opacity="0.7">✧</text>
      <text x="100" y="220" font-size="20" fill="white" opacity="0.8">✦</text>
      <text x="220" y="240" font-size="22" fill="white" opacity="0.75">✧</text>
      <text x="270" y="190" font-size="14" fill="white" opacity="0.65">✦</text>
      <!-- Animated sparkle -->
      <circle cx="160" cy="170" r="3" fill="white">
        <animate attributeName="r" values="2;5;2" dur="1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="120" r="2" fill="white">
        <animate attributeName="r" values="1;4;1" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="240" cy="200" r="2" fill="white">
        <animate attributeName="r" values="1;3;1" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- Check mark icon -->
    <circle cx="160" cy="290" r="20" fill="#4CAF50" opacity="0.9"/>
    <text x="160" y="296" text-anchor="middle" font-size="20" fill="white">✓</text>
    <!-- Label -->
    <rect x="50" y="305" width="220" height="30" rx="10" fill="#2E7D32" opacity="0.9"/>
    <text x="160" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">หลังขัด: สีรถเงางามเหมือนใหม่</text>
  </g>

  <!-- Bottom label -->
  <rect x="200" y="400" width="400" height="40" rx="15" fill="#0D47A1" opacity="0.85"/>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">ขัดคราบน้ำ + เคลือบแก้ว = ปกป้องสีรถยาวนาน | FIRSTCARCENTER</text>
</svg>
