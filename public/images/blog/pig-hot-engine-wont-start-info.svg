<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <style>@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');text{font-family:'Prompt',sans-serif;}</style>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-orange)"/>
  
  <!-- Engine and Starter Motor Graphic -->
  <g transform="translate(600, 315) scale(2)">
    <!-- Engine Block Background -->
    <path d="M-80,-60 L80,-60 L100,60 L-100,60 Z" fill="#1E293B" filter="url(#shadow-sm)"/>
    <path d="M-70,-50 L70,-50 L85,50 L-85,50 Z" fill="#0F172A"/>
    
    <!-- Heat Waves going up -->
    <path d="M-50,-70 Q-40,-85 -50,-100 Q-60,-115 -50,-130" fill="none" stroke="#EF4444" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
    </path>
    <path d="M0,-80 Q10,-95 0,-110 Q-10,-125 0,-140" fill="none" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M50,-70 Q60,-85 50,-100 Q40,-115 50,-130" fill="none" stroke="#EF4444" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite" />
    </path>

    <!-- Starter Motor attached to engine -->
    <g transform="translate(0, 20)">
      <rect x="-40" y="-20" width="80" height="40" rx="10" fill="#334155" stroke="#94A3B8" stroke-width="2" filter="url(#shadow-sm)"/>
      <circle cx="-50" cy="0" r="15" fill="#475569"/>
      <rect x="-30" y="-10" width="60" height="4" fill="#1E293B"/>
      <rect x="-30" y="6" width="60" height="4" fill="#1E293B"/>
      <!-- Sparks/Failure sign from starter -->
      <path d="M20,-30 L30,-15 L15,-15 L25,0 L5,0 L15,15" fill="none" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="-15" r="4" fill="#EF4444"/>
    </g>
    
    <!-- Temperature Gauge -->
    <g transform="translate(-120, -20)">
      <circle cx="0" cy="0" r="25" fill="#0B0F19" stroke="#94A3B8" stroke-width="3" filter="url(#shadow-sm)"/>
      <path d="M-15,10 A 18 18 0 1 1 15,10" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
      <path d="M0,-18 A 18 18 0 0 1 15,10" fill="none" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="4" fill="#FFFFFF"/>
      <!-- Needle pointing to red -->
      <path d="M0,0 L12,-12" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
  
  <rect x="300" y="520" width="600" height="60" rx="30" fill="#0B0F19" stroke="#FF6B00" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">อาการยอดฮิต: จอดแวะปั๊มซื้อของ พอกลับมาสตาร์ทไม่ติด (ไดสตาร์ทเสื่อม)</text>
</svg>
