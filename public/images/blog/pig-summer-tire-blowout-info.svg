<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&amp;display=swap');
    text { font-family: 'Prompt', sans-serif; }
  </style>
  
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow-red)"/>
  
  <!-- Hot Asphalt & Blown Tire Graphic -->
  <g transform="translate(600, 315) scale(1.8)">
    
    <!-- Hot Asphalt Road -->
    <path d="M-250,50 L250,50 L350,150 L-350,150 Z" fill="#0B0F19" filter="url(#shadow-sm)"/>
    <path d="M-250,50 L250,50" stroke="#334155" stroke-width="4"/>
    <!-- Road dashed line -->
    <path d="M-200,100 L-100,100 M0,100 L100,100 M200,100 L300,100" stroke="#FBBF24" stroke-width="8" stroke-dasharray="30,20"/>
    
    <!-- Heat waves rising from road -->
    <path d="M-150,40 Q-140,20 -150,0 Q-160,-20 -150,-40" fill="none" stroke="#EF4444" stroke-width="3" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M150,40 Q160,20 150,0 Q140,-20 150,-40" fill="none" stroke="#FF6B00" stroke-width="3" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M0,40 Q10,20 0,0 Q-10,-20 0,-40" fill="none" stroke="#EF4444" stroke-width="4" opacity="0.7">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </path>
    
    <!-- Sun/Heat Icon -->
    <circle cx="0" cy="-60" r="25" fill="#EF4444" filter="url(#shadow-sm)"/>
    <circle cx="0" cy="-60" r="15" fill="#FF6B00"/>
    <path d="M0,-100 L0,-90 M0,-30 L0,-20 M-40,-60 L-30,-60 M30,-60 L40,-60 M-28,-88 L-21,-81 M21,-39 L28,-32 M28,-88 L21,-81 M-21,-39 L-28,-32" stroke="#FF6B00" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Exploded Tire -->
    <g transform="translate(0, 30)">
      <!-- Alloy Wheel -->
      <circle cx="0" cy="0" r="45" fill="#94A3B8" stroke="#cbd5e1" stroke-width="4"/>
      <circle cx="0" cy="0" r="10" fill="#0B0F19"/>
      <path d="M0,-10 L0,-45 M0,10 L0,45 M-10,0 L-45,0 M10,0 L45,0 M-7,-7 L-32,-32 M7,7 L32,32 M7,-7 L32,-32 M-7,7 L-32,32" stroke="#334155" stroke-width="6"/>
      
      <!-- Shredded Rubber -->
      <path d="M-45,0 C-45,-25 -25,-45 0,-45 C25,-45 45,-25 45,0 C45,10 40,20 30,30 L40,40 L20,35 L10,50 L0,40 L-10,50 L-20,35 L-40,40 L-30,30 C-40,20 -45,10 -45,0 Z" fill="#1E293B" opacity="0.9"/>
      <path d="M-45,0 C-45,-25 -25,-45 0,-45 C25,-45 45,-25 45,0" fill="none" stroke="#0B0F19" stroke-width="12"/>
      
      <!-- Explosion Impact -->
      <path d="M0,50 L-15,80 L-5,70 L0,90 L5,70 L15,80 Z" fill="#EF4444"/>
      <path d="M0,55 L-8,70 L0,80 L8,70 Z" fill="#FF6B00"/>
    </g>
    
  </g>
  
  <rect x="250" y="520" width="700" height="60" rx="30" fill="#0B0F19" stroke="#EF4444" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="558" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">ถนนร้อนจัด + ยางเก่า/ลมยางอ่อน = สาเหตุหลักที่ทำให้ยางระเบิดตูม!</text>
</svg>
